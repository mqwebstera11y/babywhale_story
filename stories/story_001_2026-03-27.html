  <p>春天到了，小派派早早起床，开开心心地走路去公园。公园里花朵朵开，红的白的金的，漂亮极了。</p>
  <p>小派派在大树下看见一只毛虫，悄悄地爬着。小派派说：&quot;小毛虫，你好！你会变成漂亮的蝴蝶！&quot;</p>
  <p>晚风吹来，月亮和星星亮了。小派派回到温暖的家，妈妈说：&quot;宝贝，晚好！&quot;小派派甜甜地睡了。</p>
